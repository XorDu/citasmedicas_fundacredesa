{% extends "base.html" %}

{% block content %}
<div class="container-fluid max-w-4xl mx-auto" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Editar Historia Médica #{{ history.id }}</h2>
        <a href="{{ url_for('historias.view', id=history.id) }}" class="btn btn-outline-secondary rounded-pill"><i class="fa-solid fa-arrow-left me-2"></i>Volver</a>
    </div>

    <div class="card glass-card border-0 mb-4">
        <div class="card-body p-4">
            <form method="POST">
                
                <h5 class="text-primary-accent border-bottom pb-2 mb-3"><i class="fa-solid fa-stethoscope me-2"></i> Consulta</h5>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label text-muted small fw-medium">Motivo de Consulta</label>
                        <textarea class="form-control" name="motivo_consulta" rows="3" required>{{ history.motivo_consulta }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-muted small fw-medium">Enfermedad Actual</label>
                        <textarea class="form-control" name="enfermedad_actual" rows="3">{{ history.enfermedad_actual }}</textarea>
                    </div>
                </div>

                <h5 class="text-primary-accent border-bottom pb-2 mb-3 mt-5"><i class="fa-solid fa-file-medical-o me-2"></i> Evaluación Final</h5>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label text-muted small fw-medium">Diagnóstico</label>
                        <textarea class="form-control" name="diagnostico" rows="3">{{ history.diagnostico }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-muted small fw-medium">Tratamiento</label>
                        <textarea class="form-control" name="tratamiento" rows="3">{{ history.tratamiento }}</textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-5">
                    <button type="submit" class="btn btn-primary-accent px-5 rounded-pill shadow-sm">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
