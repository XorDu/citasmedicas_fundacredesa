{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold mb-0">Panel de Control Maestro</h2>
            <p class="text-muted">Gestión de usuarios y configuración de permisos.</p>
        </div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card glass-card border-0 h-100 text-center">
                <div class="card-body py-5">
                    <i class="fa-solid fa-user-doctor fa-3x text-primary-accent mb-3"></i>
                    <h1 class="display-4 fw-bold text-dark">{{ users_count }}</h1>
                    <p class="text-muted fw-medium mb-0">Usuarios Registrados</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card glass-card border-0 h-100 text-center">
                <div class="card-body py-5">
                    <i class="fa-solid fa-stethoscope fa-3x text-primary-accent mb-3"></i>
                    <h1 class="display-4 fw-bold text-dark">{{ specialties_count }}</h1>
                    <p class="text-muted fw-medium mb-0">Especialidades Activas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card glass-card border-0 h-100 text-center">
                <div class="card-body py-5 d-flex flex-column justify-content-center align-items-center">
                    <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-primary mb-3 w-75 rounded-pill">
                        <i class="fa-solid fa-users me-2"></i> Gestionar Usuarios
                    </a>
                    <a href="{{ url_for('admin.manage_permissions') }}" class="btn btn-primary-accent w-75 rounded-pill shadow-sm">
                        <i class="fa-solid fa-shield-halved me-2"></i> Configurar Permisos
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
