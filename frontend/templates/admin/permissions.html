{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold mb-0">Configuración de Permisos</h2>
            <p class="text-muted">Active o desactive permisos por especialidad.</p>
        </div>
    </div>

    <div class="row g-4">
        {% for p in permissions %}
        <div class="col-md-6 col-lg-4">
            <div class="card glass-card border-0 h-100">
                <div class="card-header border-0 bg-transparent pt-4 pb-0">
                    <h5 class="fw-bold mb-0 d-flex align-items-center">
                        <span class="badge rounded-circle p-2 me-2" style="background-color: {{ p.specialty.color }}; width: 15px; height: 15px;"></span>
                        {{ p.specialty.name }}
                    </h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="specialty_id" value="{{ p.specialty_id }}">
                        
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="can_create" id="cc_{{ p.id }}" {{ 'checked' if p.can_create else '' }}>
                            <label class="form-check-label fw-medium" for="cc_{{ p.id }}">Crear Citas</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="can_edit" id="ce_{{ p.id }}" {{ 'checked' if p.can_edit else '' }}>
                            <label class="form-check-label fw-medium" for="ce_{{ p.id }}">Editar Citas</label>
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" name="can_delete" id="cd_{{ p.id }}" {{ 'checked' if p.can_delete else '' }}>
                            <label class="form-check-label fw-medium text-danger" for="cd_{{ p.id }}">Eliminar Citas</label>
                        </div>
                        
                        <button type="submit" class="btn btn-outline-primary w-100 rounded-pill">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
