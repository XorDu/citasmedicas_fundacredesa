{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold mb-0">Agenda Global</h2>
            <p class="text-muted mb-0">Calendario centralizado de citas y ocupación de consultorios.</p>
        </div>
        <div class="col-md-6 text-md-end">
            <a href="{{ url_for('appointments.create') }}" class="btn btn-primary-accent rounded-pill px-4 py-2 fw-medium shadow-sm">
                <i class="fa-solid fa-plus me-2"></i> Agendar Nueva Cita
            </a>
        </div>
    </div>

    <!-- Leyenda de Especialidades -->
    <div class="card glass-card border-0 mb-4">
        <div class="card-body p-3 d-flex flex-wrap gap-3 align-items-center">
            <span class="fw-medium me-2">Especialidades:</span>
            {% for sp in specialties %}
                <div class="d-flex align-items-center">
                    <span class="badge rounded-circle p-2 me-2" style="background-color: {{ sp.color }}; width: 15px; height: 15px;"></span>
                    <span class="small text-muted">{{ sp.name }}</span>
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- Contenedor del Calendario -->
    <div class="card glass-card border-0 mb-5">
        <div class="card-body p-4">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<!-- Appointment Detail Modal -->
<div class="modal fade" id="appointmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-primary-accent"><i class="fa-regular fa-calendar-check me-2"></i> Detalle de la Cita</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-4">
                <div class="mb-3">
                    <label class="text-muted small fw-medium d-block">Paciente</label>
                    <span id="apptPatient" class="fw-bold fs-5 text-dark"></span>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="text-muted small fw-medium d-block">Especialidad</label>
                        <span id="apptSpecialty" class="badge text-white px-3 py-2"></span>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small fw-medium d-block">Consultorio / Sala</label>
                        <span id="apptRoom" class="fw-semibold text-dark"></span>
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-6">
                        <label class="text-muted small fw-medium d-block">Fecha</label>
                        <span id="apptDate" class="fw-semibold text-dark"></span>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small fw-medium d-block">Hora</label>
                        <span id="apptTime" class="fw-semibold text-dark"></span>
                    </div>
                </div>

                <div id="deleteActionContainer" class="d-none border-top pt-3">
                    <form id="deleteApptForm" method="POST" action="" onsubmit="return confirm('¿Está seguro de que desea cancelar esta cita? Esta acción no se puede deshacer.');">
                        <div class="d-grid">
                            <button type="submit" class="btn btn-outline-danger rounded-pill">
                                <i class="fa-solid fa-trash-can me-2"></i> Cancelar Cita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var appointmentModal = new bootstrap.Modal(document.getElementById('appointmentModal'));
        
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            locale: 'es',
            slotMinTime: '07:00:00',
            slotMaxTime: '19:00:00',
            allDaySlot: false,
            events: '/api/events',
            eventClick: function(info) {
                // Populate details
                document.getElementById('apptPatient').innerText = info.event.title;
                
                const specBadge = document.getElementById('apptSpecialty');
                specBadge.innerText = info.event.extendedProps.specialty;
                specBadge.style.backgroundColor = info.event.backgroundColor || '#e67e22';
                
                document.getElementById('apptRoom').innerText = info.event.extendedProps.room || 'No asignada';
                
                // Parse date & time
                const startObj = info.event.start;
                const formattedDate = startObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const formattedTime = startObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                
                document.getElementById('apptDate').innerText = formattedDate;
                document.getElementById('apptTime').innerText = formattedTime;

                // Handle delete permissions
                const deleteContainer = document.getElementById('deleteActionContainer');
                if (info.event.editable) {
                    deleteContainer.classList.remove('d-none');
                    document.getElementById('deleteApptForm').action = '/appointments/delete/' + info.event.id;
                } else {
                    deleteContainer.classList.add('d-none');
                }

                // Show modal
                appointmentModal.show();
            },
            eventDidMount: function(info) {
                if (!info.event.editable) {
                    info.el.style.opacity = '0.85';
                }
            }
        });
        calendar.render();
    });
</script>
<style>
    /* Premium tweaks for FullCalendar */
    .fc-theme-standard td, .fc-theme-standard th {
        border-color: rgba(0,0,0,0.05);
    }
    .fc .fc-button-primary {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        border-radius: 8px;
        text-transform: capitalize;
    }
    .fc .fc-button-primary:hover, .fc .fc-button-primary:not(:disabled):active, .fc .fc-button-primary:not(:disabled).fc-button-active {
        background-color: var(--secondary-color);
        border-color: var(--secondary-color);
    }
    .fc .fc-event {
        border: none;
        border-radius: 6px;
        padding: 2px 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: transform 0.2s;
    }
    .fc .fc-event:hover {
        transform: scale(1.02);
        cursor: pointer;
    }
</style>
{% endblock %}
