{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold mb-0">Agenda Global</h2>
            <p class="text-muted mb-0">Calendario centralizado de citas y ocupación de consultorios.</p>
        </div>
        <div class="col-md-6 text-md-end">
            <a href="{{ url_for('appointments.create') }}" class="btn btn-primary-accent rounded-pill px-4 py-2 fw-medium shadow-sm">
                <i class="fa-solid fa-plus me-2"></i> Agendar Nueva Cita
            </a>
        </div>
    </div>

    <!-- Leyenda de Especialidades -->
    <div class="card glass-card border-0 mb-4">
        <div class="card-body p-3 d-flex flex-wrap gap-3 align-items-center">
            <span class="fw-medium me-2">Especialidades:</span>
            {% for sp in specialties %}
                <div class="d-flex align-items-center">
                    <span class="badge rounded-circle p-2 me-2" style="background-color: {{ sp.color }}; width: 15px; height: 15px;"></span>
                    <span class="small text-muted">{{ sp.name }}</span>
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- Contenedor del Calendario -->
    <div class="card glass-card border-0 mb-5">
        <div class="card-body p-4">
            <div id="calendar"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            locale: 'es',
            slotMinTime: '07:00:00',
            slotMaxTime: '19:00:00',
            allDaySlot: false,
            events: '/api/events',
            eventClick: function(info) {
                // Si tiene permisos, se podría abrir un modal para editar/eliminar.
                // Por ahora solo mostramos info.
                alert('Cita: ' + info.event.title + '\n' +
                      'Especialidad: ' + info.event.extendedProps.specialty + '\n' +
                      'Consultorio: ' + info.event.extendedProps.room);
            },
            eventDidMount: function(info) {
                // Si la cita no es editable (de otra especialidad), se puede opacar un poco
                if (!info.event.editable) {
                    info.el.style.opacity = '0.7';
                }
            }
        });
        calendar.render();
    });
</script>
<style>
    /* Premium tweaks for FullCalendar */
    .fc-theme-standard td, .fc-theme-standard th {
        border-color: rgba(0,0,0,0.05);
    }
    .fc .fc-button-primary {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        border-radius: 8px;
        text-transform: capitalize;
    }
    .fc .fc-button-primary:hover, .fc .fc-button-primary:not(:disabled):active, .fc .fc-button-primary:not(:disabled).fc-button-active {
        background-color: var(--secondary-color);
        border-color: var(--secondary-color);
    }
    .fc .fc-event {
        border: none;
        border-radius: 6px;
        padding: 2px 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: transform 0.2s;
    }
    .fc .fc-event:hover {
        transform: scale(1.02);
        cursor: pointer;
    }
</style>
{% endblock %}
